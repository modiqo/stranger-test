<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="fun" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b7cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3ecf8e" stop-opacity="0.55"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="360" rx="16" fill="#0e1220"/>

  <text x="60" y="38" font-size="12" fill="#98a0b8">Where visitors leak — the journey is sequential, so early failures compound.</text>

  <!-- stage labels -->
  <text x="128" y="64" font-size="12" font-weight="600" fill="#c9cfec" text-anchor="middle">Promise</text>
  <text x="128" y="79" font-size="9.5" fill="#f5b642" text-anchor="middle">gate</text>
  <text x="265" y="64" font-size="12" font-weight="600" fill="#c9cfec" text-anchor="middle">The Fold</text>
  <text x="265" y="79" font-size="9.5" fill="#f5b642" text-anchor="middle">gate</text>
  <text x="402" y="64" font-size="12" font-weight="600" fill="#c9cfec" text-anchor="middle">Narrative</text>
  <text x="538" y="64" font-size="12" font-weight="600" fill="#c9cfec" text-anchor="middle">Trust</text>
  <text x="674" y="64" font-size="12" font-weight="600" fill="#c9cfec" text-anchor="middle">Pricing</text>
  <text x="811" y="64" font-size="12" font-weight="600" fill="#c9cfec" text-anchor="middle">Action</text>
  <text x="811" y="79" font-size="9.5" fill="#f5b642" text-anchor="middle">gate</text>

  <!-- funnel body -->
  <path d="M60,90 L197,114 L334,136 L470,148 L606,156 L743,162 L880,166 L880,214 L743,218 L606,224 L470,232 L334,244 L197,266 L60,290 Z" fill="url(#fun)"/>

  <!-- segment separators -->
  <line x1="197" y1="114" x2="197" y2="266" stroke="#0e1220" stroke-opacity="0.6" stroke-dasharray="3 4"/>
  <line x1="334" y1="136" x2="334" y2="244" stroke="#0e1220" stroke-opacity="0.6" stroke-dasharray="3 4"/>
  <line x1="470" y1="148" x2="470" y2="232" stroke="#0e1220" stroke-opacity="0.6" stroke-dasharray="3 4"/>
  <line x1="606" y1="156" x2="606" y2="224" stroke="#0e1220" stroke-opacity="0.6" stroke-dasharray="3 4"/>
  <line x1="743" y1="162" x2="743" y2="218" stroke="#0e1220" stroke-opacity="0.6" stroke-dasharray="3 4"/>

  <!-- converted chip -->
  <rect x="892" y="165" width="88" height="50" rx="10" fill="#3ecf8e" fill-opacity="0.12" stroke="#3ecf8e"/>
  <text x="936" y="194" font-size="11.5" font-weight="600" fill="#3ecf8e" text-anchor="middle">converted</text>

  <!-- leak labels -->
  <text x="128" y="316" font-size="10.5" fill="#98a0b8" text-anchor="middle">promise mismatch</text>
  <text x="128" y="330" font-size="10.5" fill="#98a0b8" text-anchor="middle">→ back button</text>
  <text x="265" y="316" font-size="10.5" fill="#98a0b8" text-anchor="middle">can't tell what it is</text>
  <text x="265" y="330" font-size="10.5" fill="#98a0b8" text-anchor="middle">→ bounce</text>
  <text x="402" y="316" font-size="10.5" fill="#98a0b8" text-anchor="middle">a dead section</text>
  <text x="402" y="330" font-size="10.5" fill="#98a0b8" text-anchor="middle">→ exits mid-scroll</text>
  <text x="538" y="316" font-size="10.5" fill="#98a0b8" text-anchor="middle">unproven claim</text>
  <text x="538" y="330" font-size="10.5" fill="#98a0b8" text-anchor="middle">→ doubt wins</text>
  <text x="674" y="316" font-size="10.5" fill="#98a0b8" text-anchor="middle">unforecastable bill</text>
  <text x="674" y="330" font-size="10.5" fill="#98a0b8" text-anchor="middle">→ stalls out</text>
  <text x="811" y="316" font-size="10.5" fill="#98a0b8" text-anchor="middle">surprise at the click</text>
  <text x="811" y="330" font-size="10.5" fill="#98a0b8" text-anchor="middle">→ abandons</text>
</svg>
